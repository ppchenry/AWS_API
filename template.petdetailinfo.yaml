AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  PetDetailInfoFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 60
      MemorySize: 512
      CodeUri: functions/PetDetailInfo/
      Handler: index.handler
      Runtime: nodejs22.x
      Events:
        PetDetailInfoGet:
          Type: Api
          Properties:
            Path: /pets/{petID}/detail-info
            Method: GET
        PetDetailInfoPost:
          Type: Api
          Properties:
            Path: /pets/{petID}/detail-info
            Method: POST
        PetDetailInfoOptions:
          Type: Api
          Properties:
            Path: /pets/{petID}/detail-info
            Method: OPTIONS
        PetDetailTransferPost:
          Type: Api
          Properties:
            Path: /pets/{petID}/detail-info/transfer
            Method: POST
        PetDetailTransferOptions:
          Type: Api
          Properties:
            Path: /pets/{petID}/detail-info/transfer
            Method: OPTIONS
        PetDetailTransferPut:
          Type: Api
          Properties:
            Path: /pets/{petID}/detail-info/transfer/{transferId}
            Method: PUT
        PetDetailTransferDelete:
          Type: Api
          Properties:
            Path: /pets/{petID}/detail-info/transfer/{transferId}
            Method: DELETE
        PetDetailTransferIdOptions:
          Type: Api
          Properties:
            Path: /pets/{petID}/detail-info/transfer/{transferId}
            Method: OPTIONS
        PetDetailNGOTransferPut:
          Type: Api
          Properties:
            Path: /pets/{petID}/detail-info/NGOtransfer
            Method: PUT
        PetDetailNGOTransferOptions:
          Type: Api
          Properties:
            Path: /pets/{petID}/detail-info/NGOtransfer
            Method: OPTIONS
        PetDetailSourceGet:
          Type: Api
          Properties:
            Path: /v2/pets/{petID}/detail-info/source
            Method: GET
        PetDetailSourcePost:
          Type: Api
          Properties:
            Path: /v2/pets/{petID}/detail-info/source
            Method: POST
        PetDetailSourceOptions:
          Type: Api
          Properties:
            Path: /v2/pets/{petID}/detail-info/source
            Method: OPTIONS
        PetDetailSourcePut:
          Type: Api
          Properties:
            Path: /v2/pets/{petID}/detail-info/source/{sourceId}
            Method: PUT
        PetDetailSourceIdOptions:
          Type: Api
          Properties:
            Path: /v2/pets/{petID}/detail-info/source/{sourceId}
            Method: OPTIONS
        PetDetailAdoptionGet:
          Type: Api
          Properties:
            Path: /v2/pets/{petID}/pet-adoption
            Method: GET
        PetDetailAdoptionPost:
          Type: Api
          Properties:
            Path: /v2/pets/{petID}/pet-adoption
            Method: POST
        PetDetailAdoptionOptions:
          Type: Api
          Properties:
            Path: /v2/pets/{petID}/pet-adoption
            Method: OPTIONS
        PetDetailAdoptionPut:
          Type: Api
          Properties:
            Path: /v2/pets/{petID}/pet-adoption/{adoptionId}
            Method: PUT
        PetDetailAdoptionDelete:
          Type: Api
          Properties:
            Path: /v2/pets/{petID}/pet-adoption/{adoptionId}
            Method: DELETE
        PetDetailAdoptionIdOptions:
          Type: Api
          Properties:
            Path: /v2/pets/{petID}/pet-adoption/{adoptionId}
            Method: OPTIONS
      Environment:
        Variables:
          MONGODB_URI: ""
          JWT_SECRET: ""
          JWT_BYPASS: ""
          ALLOWED_ORIGINS: ""
          TEST_PET_ID: ""
          TEST_OWNER_USER_ID: ""
          TEST_NGO_ID: ""
          NODE_ENV: "development"
