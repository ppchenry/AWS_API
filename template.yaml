  SFExpressRoutesFunction: 
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 60
      MemorySize: 512
      CodeUri: functions/SFExpressRoutes/
      Handler: index.handler
      Runtime: nodejs22.x
      Events:
        SFExpressCreateOrderPost:
          Type: Api
          Properties:
            Path: /sf-express-routes/create-order
            Method: POST
        SFExpressCreateOrderOptions:
          Type: Api
          Properties:
            Path: /sf-express-routes/create-order
            Method: OPTIONS
        SFExpressPickupLocationsPost:
          Type: Api
          Properties:
            Path: /sf-express-routes/get-pickup-locations
            Method: POST
        SFExpressPickupLocationsOptions:
          Type: Api
          Properties:
            Path: /sf-express-routes/get-pickup-locations
            Method: OPTIONS
        SFExpressGetTokenPost:
          Type: Api
          Properties:
            Path: /sf-express-routes/get-token
            Method: POST
        SFExpressGetTokenOptions:
          Type: Api
          Properties:
            Path: /sf-express-routes/get-token
            Method: OPTIONS
        SFExpressGetAreaPost:
          Type: Api
          Properties:
            Path: /sf-express-routes/get-area
            Method: POST
        SFExpressGetAreaOptions:
          Type: Api
          Properties:
            Path: /sf-express-routes/get-area
            Method: OPTIONS
        SFExpressGetNetCodePost:
          Type: Api
          Properties:
            Path: /sf-express-routes/get-netCode
            Method: POST
        SFExpressGetNetCodeOptions:
          Type: Api
          Properties:
            Path: /sf-express-routes/get-netCode
            Method: OPTIONS
        SFExpressPrintCloudWayBillPost:
          Type: Api
          Properties:
            Path: /v2/sf-express-routes/print-cloud-waybill
            Method: POST
        SFExpressPrintCloudWayBillOptions:
          Type: Api
          Properties:
            Path: /v2/sf-express-routes/print-cloud-waybill
            Method: OPTIONS
      Environment:
        Variables:
          JWT_SECRET: ""
          JWT_BYPASS: ""
          ALLOWED_ORIGINS: ""
          MONGODB_URI: ""
          SF_CUSTOMER_CODE: ""
          SF_PRODUCTION_CHECK_CODE: ""
          SF_SANDBOX_CHECK_CODE: ""
          SMTP_FROM: ""
          SMTP_HOST: ""
          SMTP_PASS: ""
          SMTP_PORT: ""
          SMTP_USER: ""
          SF_ADDRESS_API_KEY: ""
          NODE_ENV: "development"

  OrderVerification:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 60
      MemorySize: 512
      CodeUri: functions/OrderVerification/
      Handler: index.handler
      Runtime: nodejs22.x
      Events:
        OrderVerificationSupplierGet:
          Type: Api
          Properties:
            Path: /v2/orderVerification/supplier/{orderId}
            Method: GET
        OrderVerificationSupplierPut:
          Type: Api
          Properties:
            Path: /v2/orderVerification/supplier/{orderId}
            Method: PUT
        OrderVerificationSupplierOptions:
          Type: Api
          Properties:
            Path: /v2/orderVerification/supplier/{orderId}
            Method: OPTIONS
        OrderVerificationWhatsappOrderLinkGet:
          Type: Api
          Properties:
            Path: /v2/orderVerification/whatsapp-order-link/{_id}
            Method: GET
        OrderVerificationWhatsappOrderLinkOptions:
          Type: Api
          Properties:
            Path: /v2/orderVerification/whatsapp-order-link/{_id}
            Method: OPTIONS
        OrderVerificationOrdersInfoGet:
          Type: Api
          Properties:
            Path: /v2/orderVerification/ordersInfo/{tempId}
            Method: GET
        OrderVerificationOrdersInfoOptions:
          Type: Api
          Properties:
            Path: /v2/orderVerification/ordersInfo/{tempId}
            Method: OPTIONS
        OrderVerificationGetAllOrdersGet:
          Type: Api
          Properties:
            Path: /v2/orderVerification/getAllOrders
            Method: GET
        OrderVerificationGetAllOrdersOptions:
          Type: Api
          Properties:
            Path: /v2/orderVerification/getAllOrders
            Method: OPTIONS
        OrderVerificationTagIdGet:
          Type: Api
          Properties:
            Path: /v2/orderVerification/{tagId}
            Method: GET
        OrderVerificationTagIdPut:
          Type: Api
          Properties:
            Path: /v2/orderVerification/{tagId}
            Method: PUT
        OrderVerificationTagIdDelete:
          Type: Api
          Properties:
            Path: /v2/orderVerification/{tagId}
            Method: DELETE
        OrderVerificationTagIdOptions:
          Type: Api
          Properties:
            Path: /v2/orderVerification/{tagId}
            Method: OPTIONS
      Environment:
        Variables:
          JWT_SECRET: ""
          JWT_BYPASS: ""
          ALLOWED_ORIGINS: ""
          MONGODB_URI: ""
          WHATSAPP_BEARER_TOKEN: ""
          NODE_ENV: "development"

