  UserRoutesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 60
      MemorySize: 512
      CodeUri: functions/UserRoutes/
      Handler: index.handler
      Runtime: nodejs22.x
      Events:
        AccountRootOptions:
          Type: Api
          Properties:
            Path: /account
            Method: OPTIONS

        AccountRootPut:
          Type: Api
          Properties:
            Path: /account
            Method: PUT

        UserList:
          Type: Api
          Properties:
            Path: /account/user-list
            Method: GET

        EditNgoGet:
          Type: Api
          Properties:
            Path: /account/edit-ngo/{ngoId}
            Method: GET

        EditNgoPut:
          Type: Api
          Properties:
            Path: /account/edit-ngo/{ngoId}
            Method: PUT

        EditNgoPetPlacementOptionsGet:
          Type: Api
          Properties:
            Path: /account/edit-ngo/{ngoId}/pet-placement-options
            Method: GET

        AccountUserIdDelete:
          Type: Api
          Properties:
            Path: /account/{userId}
            Method: DELETE
        AccountUserIdGet:
          Type: Api
          Properties:
            Path: /account/{userId}
            Method: GET

        AccountUserIdOptions:
          Type: Api
          Properties:
            Path: /account/{userId}
            Method: OPTIONS

        DeleteUserWithEmail:
          Type: Api
          Properties:
            Path: /account/delete-user-with-email
            Method: POST

        GenerateSmsCode:
          Type: Api
          Properties:
            Path: /account/generate-sms-code
            Method: POST

        Login:
          Type: Api
          Properties:
            Path: /account/login
            Method: POST

        Login2:
          Type: Api
          Properties:
            Path: /account/login-2
            Method: POST

        Register:
          Type: Api
          Properties:
            Path: /account/register
            Method: POST

        RegisterNgo:
          Type: Api
          Properties:
            Path: /account/register-ngo
            Method: POST

        RegisterByEmail:
          Type: Api
          Properties:
            Path: /account/register-by-email
            Method: POST

        RegisterByPhoneNumber:
          Type: Api
          Properties:
            Path: /account/register-by-phoneNumber
            Method: POST

        RegisterEmail2:
          Type: Api
          Properties:
            Path: /account/register-email-2
            Method: POST

        UpdateImage:
          Type: Api
          Properties:
            Path: /account/update-image
            Method: POST

        UpdatePassword:
          Type: Api
          Properties:
            Path: /account/update-password
            Method: PUT

        VerifySmsCode:
          Type: Api
          Properties:
            Path: /account/verify-sms-code
            Method: POST

      Environment:
        Variables:
          TWILIO_ACCOUNT_SID: ""
          TWILIO_AUTH_TOKEN: ""
          TWILIO_VERIFY_SERVICE_SID: ""
          REFRESH_TOKEN_MAX_AGE_SEC: ""
          JWT_SECRET: ""
          JWT_BYPASS: ""
          MONGODB_URI: ""
          ALLOWED_ORIGINS: ""
          NODE_ENV: "development"
            