  AuthRouteFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 60
      MemorySize: 512
      CodeUri: functions/AuthRoute/
      Handler: index.handler
      Runtime: nodejs22.x
      Events:
        RefreshOptions:
          Type: Api
          Properties:
            Path: /auth/refresh
            Method: OPTIONS

        Refresh:
          Type: Api
          Properties:
            Path: /auth/refresh
            Method: POST
      Environment:
        Variables:
          JWT_SECRET: ""
          JWT_BYPASS: ""
          MONGODB_URI: ""
          ALLOWED_ORIGINS: ""
          NODE_ENV: "development"

  GetAllPetsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 60
      MemorySize: 512
      CodeUri: functions/GetAllPets/
      Handler: index.handler
      Runtime: nodejs22.x
      Events:
        PetListNGOOptions:
          Type: Api
          Properties:
            Path: /pets/pet-list-ngo/{ngoId}
            Method: OPTIONS
        
        DeletePetOptions:
          Type: Api
          Properties:
            Path: /pets/deletePet
            Method: OPTIONS
          
        UpdatePetEyeOptions:
          Type: Api
          Properties:
            Path: /pets/updatePetEye
            Method: OPTIONS
        
        PetListOptions:
          Type: Api
          Properties:
            Path: /pets/pet-list/{userId}
            Method: OPTIONS

        PetListNGO:
          Type: Api
          Properties:
            Path: /pets/pet-list-ngo/{ngoId}
            Method: GET
        
        DeletePet:
          Type: Api
          Properties:
            Path: /pets/deletePet
            Method: POST
          
        UpdatePetEye:
          Type: Api
          Properties:
            Path: /pets/updatePetEye
            Method: PUT
        
        PetList:
          Type: Api
          Properties:
            Path: /pets/pet-list/{userId}
            Method: GET
      Environment:
        Variables:
          JWT_SECRET: ""
          JWT_BYPASS: ""
          MONGODB_URI: ""
          ALLOWED_ORIGINS: ""
          NODE_ENV: "development"

